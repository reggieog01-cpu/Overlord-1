<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser History</title>
    <link rel="stylesheet" href="/plugins/browser-history/assets/browser-history.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Browser History</h1>
        <p class="sub">Full browsing history across all browsers and profiles — sorted alphabetically by domain</p>
      </header>

      <!-- Controls -->
      <section class="card">
        <div class="row">
          <label class="label">Client ID</label>
          <input id="client-id" class="input" readonly placeholder="loaded from URL" />
        </div>
        <div class="actions">
          <button id="scan-btn" class="btn">&#x1F50D; Scan Again</button>
          <span id="status-pill" class="status-pill status-idle">Awaiting scan&hellip;</span>
        </div>
      </section>

      <!-- Results -->
      <section class="card">
        <div class="results-header">
          <h2>History Entries</h2>
          <span id="count-badge" class="count-badge hidden">0</span>
        </div>
        <div id="results-area">
          <p class="empty-msg">No scan results yet. The plugin auto-scans on load.</p>
        </div>
      </section>

      <!-- Log -->
      <section class="card">
        <h2>Log</h2>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="/plugins/browser-history/assets/browser-history.js"></script>
  </body>
</html>
